name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-release:
    name: Create Draft Release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get-version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `MoPNG Desktop ${context.ref.replace('refs/tags/v', '')}`,
              body: '⏳ 构建中，请稍候...\n\n**配置信息：**\n- 模型服务器：`${{ secrets.MODEL_URL || 'https://modelscope.cn/models/onnx-community/BiRefNet-ONNX/resolve/main/onnx/' }}`\n- 模型文件：`${{ secrets.MODEL_FILENAME || 'model.onnx' }}`\n\n**下载说明：**\n- 🍎 macOS Apple Silicon (M1/M2/M3): `*-aarch64.dmg`\n- 🖥️ macOS Intel: `*-x86_64.dmg`\n- 🪟 Windows: `*-setup.exe`\n- 🐧 Linux: `*.AppImage` 或 `*.deb`',
              draft: true,
              prerelease: false,
              generate_release_notes: false,
            })
            return data.id

  build-tauri:
    name: Build ${{ matrix.name }}
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (ARM64)
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            name: macOS-Apple-Silicon
            target: aarch64-apple-darwin

          # macOS Intel (x64) - universal2 ORT 库支持双架构
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            name: macOS-Intel
            target: x86_64-apple-darwin

          # Linux - ORT 原生支持
          - platform: ubuntu-24.04
            args: ''
            name: Linux
            target: ''

          # Windows - ORT 原生支持
          - platform: windows-latest
            args: ''
            name: Windows
            target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Rust targets (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      # macOS Intel 交叉编译需要手动提供 x86_64 的 ONNX Runtime 库
      # `download-binaries` 在 ARM runner 上会下 ARM 版，链接 Intel 目标会失败
      # universal2 二进制同时包含 arm64 + x86_64，链接器自动选对应 slice
      # 注意：pyke.io 不提供 x86_64-apple-darwin 预编译静态库，所以使用
      # Microsoft 的 universal2 动态库（.dylib），通过 ORT_PREFER_DYNAMIC_LINK=1
      # 启用动态链接，构建后由 Bundle dylib 步骤将库打包进 .app bundle
      - name: Download ONNX Runtime for macOS Intel cross-compilation
        if: matrix.name == 'macOS-Intel'
        run: |
          curl -LO https://github.com/microsoft/onnxruntime/releases/download/v1.18.1/onnxruntime-osx-universal2-1.18.1.tgz
          tar xzf onnxruntime-osx-universal2-1.18.1.tgz
          echo "ORT_LIB_LOCATION=$(pwd)/onnxruntime-osx-universal2-1.18.1/lib" >> $GITHUB_ENV
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> $GITHUB_ENV

      # macOS 代码签名：导入 Developer ID 证书
      - name: Setup macOS code signing
        if: matrix.platform == 'macos-latest'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
        run: |
          # 创建临时 keychain
          KEYCHAIN_FILE=$RUNNER_TEMP/build.keychain
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_FILE"
          security default-keychain -s "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_FILE"
          security set-keychain-settings -lut 900 "$KEYCHAIN_FILE"

          # 解码并导入 p12 证书
          echo "$MACOS_CERTIFICATE" | base64 --decode -o "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_FILE" \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # 允许 codesign 访问证书（避免 GUI 弹窗）
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_FILE" 2>/dev/null || true

          echo "Signing identity configured:"
          security find-identity -v -p basic "$KEYCHAIN_FILE"

      # 注意：不使用 rust-cache，避免与 tauri-action 冲突
      # tauri-action 会自动处理 Rust 依赖缓存
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 编译时注入模型配置（GitHub Secrets 可覆盖默认值）
          MODEL_URL: ${{ secrets.MODEL_URL || 'https://mocdn.mopng.cn/models/' }}
          MODEL_FILENAME: ${{ secrets.MODEL_FILENAME || 'model.onnx' }}
        with:
          args: ${{ matrix.args }}
          releaseId: ${{ needs.create-release.outputs.release_id }}

      # 将 libonnxruntime.dylib 打包进 .app bundle 的 Frameworks 目录
      # 并修复二进制中的库引用路径
      - name: Bundle ONNX Runtime dylib for macOS Intel
        if: matrix.name == 'macOS-Intel'
        run: |
          # 查找 tauri 构建生成的 .app bundle
          APP_BUNDLE=$(find src-tauri/target -name "*.app" -type d | head -1)
          echo "Found app bundle: $APP_BUNDLE"

          # 创建 Frameworks 目录
          mkdir -p "$APP_BUNDLE/Contents/Frameworks"

          # 复制 libonnxruntime.dylib
          cp onnxruntime-osx-universal2-1.18.1/lib/libonnxruntime*.dylib "$APP_BUNDLE/Contents/Frameworks/"

          # 修复 dylib 自身的 install name（确保 @rpath 正确）
          for DYLIB in "$APP_BUNDLE/Contents/Frameworks/"libonnxruntime*.dylib; do
            chmod +w "$DYLIB"
            install_name_tool -id "@rpath/$(basename "$DYLIB")" "$DYLIB" 2>/dev/null || true
          done

          # 修复主二进制中的引用路径
          BINARY="$APP_BUNDLE/Contents/MacOS/mopng-desktop"
          if [ -f "$BINARY" ]; then
            # 添加 rpath 指向 Frameworks 目录
            install_name_tool -add_rpath "@executable_path/../Frameworks" "$BINARY" 2>/dev/null || true
            # 打印链接信息以便调试
            echo "Binary dylib references:"
            otool -L "$BINARY" | grep onnxruntime
          fi

      # macOS 公证 (Notarization)
      # 将 .dmg 提交给 Apple 公证，消除 Gatekeeper "无法验证开发者" 弹窗
      - name: Notarize macOS app
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          # 写出 API 私钥文件
          echo "$APPLE_API_KEY" > "$RUNNER_TEMP/AuthKey.p8"

          # 找到构建产物 .dmg
          DMG_PATH=$(find src-tauri/target -name "*.dmg" -type f | head -1)
          echo "Notarizing: $DMG_PATH"

          # 提交公证
          xcrun notarytool submit "$DMG_PATH" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --team-id "K75279AUL7" \
            --wait \
            --timeout 10m

          # 装订公证票据到 .dmg
          xcrun stapler staple "$DMG_PATH" || true
          echo "Notarization complete"

  publish-release:
    name: Publish Release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [create-release, build-tauri]
    if: always() && needs.create-release.result == 'success'
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = ${{ needs.create-release.outputs.release_id }};
            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });

            // Only publish if we have assets or build succeeded
            const buildSuccess = ${{ needs.build-tauri.result == 'success' }};
            
            if (buildSuccess) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                draft: false,
                body: release.body.replace('⏳ 构建中，请稍候...', '✅ 构建完成'),
              });
              console.log('Release published successfully');
            } else {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                body: release.body.replace('⏳ 构建中，请稍候...', '⚠️ 部分平台构建失败，请检查构建日志'),
              });
              core.setFailed('Build failed, release kept as draft');
            }