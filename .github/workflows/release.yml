name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-release:
    name: Create Draft Release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get-version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `MoPNG Desktop ${context.ref.replace('refs/tags/v', '')}`,
              body: '⏳ 构建中，请稍候...\n\n**配置信息：**\n- 模型服务器：`${{ secrets.MODEL_URL || 'https://mocdn.mopng.cn/models/' }}`\n- 模型文件：`${{ secrets.MODEL_FILENAME || 'birefnet_fp16.onnx' }}`\n\n**下载说明：**\n- 🍎 macOS Apple Silicon (M1/M2/M3): `*-aarch64.dmg`\n- 🖥️ macOS Intel: `*-x86_64.dmg`\n- 🪟 Windows: `*-setup.exe`\n- 🐧 Linux: `*.AppImage` 或 `*.deb`',
              draft: true,
              prerelease: false,
              generate_release_notes: false,
            })
            return data.id

  build-tauri:
    name: Build ${{ matrix.name }}
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (ARM64)
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            name: macOS-Apple-Silicon
            target: aarch64-apple-darwin

          # macOS Intel (x64) - tract-onnx 支持全平台
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            name: macOS-Intel
            target: x86_64-apple-darwin

          # Linux - tract-onnx 支持
          - platform: ubuntu-22.04
            args: ''
            name: Linux
            target: ''

          # Windows - tract-onnx 支持
          - platform: windows-latest
            args: ''
            name: Windows
            target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Rust targets (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      # 注意：不使用 rust-cache，避免与 tauri-action 冲突
      # tauri-action 会自动处理 Rust 依赖缓存
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 编译时注入模型配置（GitHub Secrets 可覆盖默认值）
          MODEL_URL: ${{ secrets.MODEL_URL || 'https://mocdn.mopng.cn/models/' }}
          MODEL_FILENAME: ${{ secrets.MODEL_FILENAME || 'birefnet_fp16.onnx' }}
        with:
          args: ${{ matrix.args }}
          releaseId: ${{ needs.create-release.outputs.release_id }}

  publish-release:
    name: Publish Release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [create-release, build-tauri]
    if: always() && needs.create-release.result == 'success'
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = ${{ needs.create-release.outputs.release_id }};
            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });

            // Only publish if we have assets or build succeeded
            const buildSuccess = ${{ needs.build-tauri.result == 'success' }};
            
            if (buildSuccess) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                draft: false,
                body: release.body.replace('⏳ 构建中，请稍候...', '✅ 构建完成'),
              });
              console.log('Release published successfully');
            } else {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                body: release.body.replace('⏳ 构建中，请稍候...', '⚠️ 部分平台构建失败，请检查构建日志'),
              });
              core.setFailed('Build failed, release kept as draft');
            }